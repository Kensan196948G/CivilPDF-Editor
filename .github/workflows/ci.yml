name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
        env:
          # The Electron binary isn't needed for lint/typecheck/test/renderer build.
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
