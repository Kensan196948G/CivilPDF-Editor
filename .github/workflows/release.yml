name: Release

# Tag push (v*) builds installers per-OS and publishes them to a GitHub Release.
# The CivilPDF-DX console's app distribution page consumes these release assets
# via APPS_RELEASE_BASE_URL (see docs/deployment/app-distribution.md there).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package installers
        run: npm run ${{ matrix.script }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist-release/*.exe
            dist-release/*.msi
            dist-release/*.dmg
            dist-release/*.pkg
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
